<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="LoginStyles.css">
</head>
<body>
    <div id="Container">
        <div id="titulo">
            <img src="../images/escudo-color.png" alt="Escudo">
            <h1>Ucundinamarca Fusagasugá</h1>
        </div>

        <div id="Login">
            <div id="login_card">
                <div id="CampoTitulo">
                    <h1>Bienvenido</h1>
                    <p>Por favor inicia sesión</p>
                </div>

                <form action="">
                    <input type="text" placeholder="Nombre" name="nombre" id="nombre">
                    <input type="text" placeholder="Documento" name="documento" id="documento">
                    <input type="text" placeholder="Teléfono" name="telefono" id="telefono">
                    <input type="email" placeholder="Correo" name="email" id="Email">
                    <input type="password" name="password" id="Password" placeholder="Contraseña">
                    <input type="submit" value="Iniciar sesión">
                </form>

                <div id="terms">
                    <a href="">Terms of service</a>
                    <a href="">Support</a>
                    <a href="">Contacts</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
